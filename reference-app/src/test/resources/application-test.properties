# Test configuration using H2 in-memory database
spring.application.name=job-platform-reference-app-test

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Worker disabled for tests
platform.jobs.worker.enabled=false

# Logging
logging.level.io.github.thestacktracewhisperer=DEBUG
