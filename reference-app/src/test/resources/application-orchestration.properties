# E2E orchestration test configuration
spring.application.name=job-platform-orchestration-test

# H2 Database
spring.datasource.url=jdbc:h2:mem:orchestration_testdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Worker ENABLED for orchestration testing
platform.jobs.worker.enabled=true
platform.jobs.worker.concurrency=5
platform.jobs.worker.max-attempts=3
platform.jobs.worker.polling-interval-ms=100
platform.jobs.worker.queue-metrics-interval-ms=3600000

# Logging
logging.level.io.github.thestacktracewhisperer=DEBUG
