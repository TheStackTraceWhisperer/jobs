# JMeter Test Configuration
# This file contains default configuration for all JMeter test plans used in this project.
#
# IMPORTANT: JMeter does NOT load this file automatically from this directory.
# The run-tests.sh script passes this file using "-q jmeter.properties" for the settings to take effect.
# If running JMeter directly, use: jmeter -n -t <test-plan>.jmx -q jmeter.properties

# Target Application Configuration
host=localhost
port=8080

# Default Test Parameters (referenced by test plans via __P(...))
threads=50
duration=300
rampup=30
loops=1000
baseline_threads=50
peak_threads=200
spike_threads=500

# Result Output Configuration
results.dir=./results
logs.dir=./logs
reports.dir=./reports

# JMeter Performance Tuning
# Uncomment and adjust these values for large-scale tests
# jmeter.save.saveservice.output_format=csv
# jmeter.save.saveservice.assertion_results_failure_message=false
# jmeter.save.saveservice.response_data=false
# jmeter.save.saveservice.samplerData=false

# HTTP Settings
http.connection.timeout=5000
http.response.timeout=10000
http.keepalive=true

# Monitoring Configuration
monitor.interval=10000
metrics.collection.interval=5000
