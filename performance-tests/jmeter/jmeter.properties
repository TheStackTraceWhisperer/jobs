# JMeter Test Configuration
# This file contains default configuration for all JMeter test plans

# Target Application Configuration
host=localhost
port=8080

# Throughput Test Configuration
throughput.threads=50
throughput.duration=300
throughput.rampup=30

# Latency Test Configuration
latency.threads=25
latency.loops=1000
latency.rampup=10

# Stress Test Configuration
stress.baseline_threads=50
stress.peak_threads=200
stress.spike_threads=500

# Result Output Configuration
results.dir=./results
logs.dir=./logs
reports.dir=./reports

# JMeter Performance Tuning
# Uncomment and adjust these values for large-scale tests
# jmeter.save.saveservice.output_format=csv
# jmeter.save.saveservice.assertion_results_failure_message=false
# jmeter.save.saveservice.response_data=false
# jmeter.save.saveservice.samplerData=false

# HTTP Settings
http.connection.timeout=5000
http.response.timeout=10000
http.keepalive=true

# Monitoring Configuration
monitor.interval=10000
metrics.collection.interval=5000
